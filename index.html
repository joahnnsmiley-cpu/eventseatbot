<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Бронирование мест</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script>
    // Debug overlay — shows JS errors in VK WebView where DevTools are unavailable
    window.__dbg = function (msg) {
      var el = document.getElementById('__dbg');
      if (el) el.innerText += '\n' + msg;
    };
    window.onerror = function (msg, src, line, col, err) {
      var el = document.getElementById('__dbg');
      if (el) {
        el.style.display = 'block';
        el.innerText += '\nERROR: ' + msg + '\nat ' + src + ':' + line;
      }
    };
    window.onunhandledrejection = function (e) {
      var el = document.getElementById('__dbg');
      if (el) {
        el.style.display = 'block';
        el.innerText += '\nPROMISE REJECT: ' + (e.reason || e);
      }
    };
    window.__dbg('HTML loaded OK');
  </script>
</head>

<body>
  <div id="__dbg"
    style="display:none;position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font-size:12px;padding:8px;z-index:99999;white-space:pre-wrap;word-break:break-all;max-height:50vh;overflow:auto;">
  </div>
  <div id="root"></div>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Load vk-bridge from CDN and call VKWebAppInit synchronously, before any modules -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    try {
      if (window.vkBridge) {
        window.__dbg('vkBridge found, calling VKWebAppInit');
        window.vkBridge.send('VKWebAppInit').then(function () {
          window.__dbg('VKWebAppInit OK');
        }).catch(function (e) {
          window.__dbg('VKWebAppInit REJECT: ' + e);
        });
      } else {
        window.__dbg('vkBridge NOT found on window');
      }
    } catch (e) {
      window.__dbg('VKWebAppInit exception: ' + e);
    }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
